<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 莫兰迪风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8e0d5 0%, #d4c8b8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #8b7e6a;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .score-box {
            background: rgba(255,255,255,0.6);
            padding: 10px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .score-label {
            color: #9a8b7a;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            color: #6b5d4d;
            font-size: 24px;
            font-weight: 600;
        }

        .btn {
            background: #a69888;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .btn:hover {
            background: #8f8273;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-container {
            background: rgba(255,255,255,0.4);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin: 20px auto;
            position: relative;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: rgba(187, 173, 160, 0.3);
            padding: 12px;
            border-radius: 12px;
        }

        .grid-cell {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(238, 228, 218, 0.6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: #6b5d4d;
            transition: all 0.15s ease;
        }

        /* 莫兰迪色系数字块 */
        .tile-2 {
            background: #e8e0d5 !important;
            color: #6b5d4d;
        }

        .tile-4 {
            background: #dcd4c8 !important;
            color: #6b5d4d;
        }

        .tile-8 {
            background: #c9b8a5 !important;
            color: white;
        }

        .tile-16 {
            background: #b5a390 !important;
            color: white;
        }

        .tile-32 {
            background: #a69888 !important;
            color: white;
        }

        .tile-64 {
            background: #9a8b7a !important;
            color: white;
        }

        .tile-128 {
            background: #8f9aa8 !important;
            color: white;
            font-size: 24px;
        }

        .tile-256 {
            background: #7a8a9a !important;
            color: white;
            font-size: 24px;
        }

        .tile-512 {
            background: #6b7a8f !important;
            color: white;
            font-size: 24px;
        }

        .tile-1024 {
            background: #8fa68a !important;
            color: white;
            font-size: 20px;
        }

        .tile-2048 {
            background: #7a8f75 !important;
            color: white;
            font-size: 20px;
            animation: glow 1.5s ease-in-out infinite;
        }

        .tile-super {
            background: #9a8b9a !important;
            color: white;
            font-size: 18px;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(122, 143, 117, 0.5); }
            50% { box-shadow: 0 0 30px rgba(122, 143, 117, 0.8); }
        }

        .instructions {
            text-align: center;
            color: #8b7e6a;
            font-size: 14px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .game-over, .game-won {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(232, 224, 213, 0.95);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .game-over.show, .game-won.show {
            opacity: 1;
            visibility: visible;
        }

        .game-over h2, .game-won h2 {
            color: #8b7e6a;
            font-size: 36px;
            margin-bottom: 15px;
        }

        .game-won h2 {
            color: #7a8f75;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
        }

        .mobile-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
        }

        .mobile-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.6);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            color: #8b7e6a;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .mobile-btn:active {
            background: rgba(255,255,255,0.9);
            transform: scale(0.95);
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 36px;
            }
            
            .grid-cell {
                font-size: 22px;
            }
            
            .tile-128, .tile-256, .tile-512 {
                font-size: 18px;
            }
            
            .tile-1024, .tile-2048 {
                font-size: 16px;
            }
            
            .mobile-controls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>2048</h1>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
            <button class="btn" onclick="newGame()">新游戏</button>
        </header>

        <div class="game-container">
            <div class="grid-container" id="grid">
                <div class="grid-cell" id="cell-0-0"></div>
                <div class="grid-cell" id="cell-0-1"></div>
                <div class="grid-cell" id="cell-0-2"></div>
                <div class="grid-cell" id="cell-0-3"></div>
                <div class="grid-cell" id="cell-1-0"></div>
                <div class="grid-cell" id="cell-1-1"></div>
                <div class="grid-cell" id="cell-1-2"></div>
                <div class="grid-cell" id="cell-1-3"></div>
                <div class="grid-cell" id="cell-2-0"></div>
                <div class="grid-cell" id="cell-2-1"></div>
                <div class="grid-cell" id="cell-2-2"></div>
                <div class="grid-cell" id="cell-2-3"></div>
                <div class="grid-cell" id="cell-3-0"></div>
                <div class="grid-cell" id="cell-3-1"></div>
                <div class="grid-cell" id="cell-3-2"></div>
                <div class="grid-cell" id="cell-3-3"></div>
            </div>

            <div class="game-over" id="game-over">
                <h2>游戏结束</h2>
                <button class="btn" onclick="newGame()">再试一次</button>
            </div>

            <div class="game-won" id="game-won">
                <h2>🎉 恭喜获胜！</h2>
                <button class="btn" onclick="continueGame()">继续游戏</button>
            </div>
        </div>

        <div class="mobile-controls">
            <div class="mobile-row">
                <button class="mobile-btn" onclick="move('up')">↑</button>
            </div>
            <div class="mobile-row">
                <button class="mobile-btn" onclick="move('left')">←</button>
                <button class="mobile-btn" onclick="move('down')">↓</button>
                <button class="mobile-btn" onclick="move('right')">→</button>
            </div>
        </div>

        <div class="instructions">
            <p><strong>玩法：</strong>使用方向键 ↑↓←→ 或滑动屏幕移动方块</p>
            <p>相同数字的方块相撞时会合并，目标是得到 2048！</p>
        </div>
    </div>

    <script>
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore2048') || 0;
        let hasWon = false;
        let touchStartX = 0;
        let touchStartY = 0;

        document.getElementById('best-score').textContent = bestScore;

        function init() {
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            updateScore();
            hideOverlays();
            addNewTile();
            addNewTile();
            render();
        }

        function hideOverlays() {
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('game-won').classList.remove('show');
        }

        function addNewTile() {
            const emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) {
                        emptyCells.push({r, c});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    const value = board[r][c];
                    cell.textContent = value === 0 ? '' : value;
                    cell.className = 'grid-cell';
                    if (value > 0) {
                        cell.classList.add(`tile-${value <= 2048 ? value : 'super'}`);
                    }
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore2048', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function move(direction) {
            let moved = false;
            const newBoard = board.map(row => [...row]);

            function slideRow(row) {
                const filtered = row.filter(val => val !== 0);
                for (let i = 0; i < filtered.length - 1; i++) {
                    if (filtered[i] === filtered[i + 1]) {
                        filtered[i] *= 2;
                        score += filtered[i];
                        if (filtered[i] === 2048 && !hasWon) {
                            hasWon = true;
                            setTimeout(() => {
                                document.getElementById('game-won').classList.add('show');
                            }, 200);
                        }
                        filtered[i + 1] = 0;
                    }
                }
                const result = filtered.filter(val => val !== 0);
                while (result.length < 4) {
                    result.push(0);
                }
                return result;
            }

            if (direction === 'left') {
                for (let r = 0; r < 4; r++) {
                    const newRow = slideRow(newBoard[r]);
                    if (JSON.stringify(newRow) !== JSON.stringify(newBoard[r])) {
                        moved = true;
                    }
                    newBoard[r] = newRow;
                }
            } else if (direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    const newRow = slideRow(newBoard[r].reverse()).reverse();
                    if (JSON.stringify(newRow) !== JSON.stringify(newBoard[r])) {
                        moved = true;
                    }
                    newBoard[r] = newRow;
                }
            } else if (direction === 'up') {
                for (let c = 0; c < 4; c++) {
                    const col = [newBoard[0][c], newBoard[1][c], newBoard[2][c], newBoard[3][c]];
                    const newCol = slideRow(col);
                    for (let r = 0; r < 4; r++) {
                        if (newBoard[r][c] !== newCol[r]) {
                            moved = true;
                        }
                        newBoard[r][c] = newCol[r];
                    }
                }
            } else if (direction === 'down') {
                for (let c = 0; c < 4; c++) {
                    const col = [newBoard[0][c], newBoard[1][c], newBoard[2][c], newBoard[3][c]];
                    const newCol = slideRow(col.reverse()).reverse();
                    for (let r = 0; r < 4; r++) {
                        if (newBoard[r][c] !== newCol[r]) {
                            moved = true;
                        }
                        newBoard[r][c] = newCol[r];
                    }
                }
            }

            if (moved) {
                board = newBoard;
                updateScore();
                addNewTile();
                render();
                if (isGameOver()) {
                    setTimeout(() => {
                        document.getElementById('game-over').classList.add('show');
                    }, 300);
                }
            }
        }

        function isGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) {
                        return false;
                    }
                    if (c < 3 && board[r][c] === board[r][c + 1]) {
                        return false;
                    }
                    if (r < 3 && board[r][c] === board[r + 1][c]) {
                        return false;
                    }
                }
            }
            return true;
        }

        function newGame() {
            init();
        }

        function continueGame() {
            document.getElementById('game-won').classList.remove('show');
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    move('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    move('down');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    move('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    move('right');
                    break;
            }
        });

        // 触摸控制
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const minSwipeDistance = 50;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > minSwipeDistance) {
                    if (dx > 0) {
                        move('right');
                    } else {
                        move('left');
                    }
                }
            } else {
                if (Math.abs(dy) > minSwipeDistance) {
                    if (dy > 0) {
                        move('down');
                    } else {
                        move('up');
                    }
                }
            }
        }, { passive: true });

        // 防止页面滚动
        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('.game-container')) {
                e.preventDefault();
            }
        }, { passive: false });

        // 初始化游戏
        init();
    </script>
</body>
</html>
