<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048对对碰</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>对对碰</h1>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
            <button class="btn" onclick="newGame()">新游戏</button>
        </header>

        <div class="game-container">
            <div class="grid-container" id="grid"></div>

            <div class="game-over" id="game-over">
                <h2>游戏结束</h2>
                <button class="btn" onclick="newGame()">再试一次</button>
            </div>

            <div class="game-won" id="game-won">
                <h2>🎉 恭喜获胜！</h2>
                <button class="btn" onclick="continueGame()">继续游戏</button>
            </div>
        </div>

        <div class="mobile-controls">
            <div class="mobile-row">
                <button class="mobile-btn" onclick="move('up')">↑</button>
            </div>
            <div class="mobile-row">
                <button class="mobile-btn" onclick="move('left')">←</button>
                <button class="mobile-btn" onclick="move('down')">↓</button>
                <button class="mobile-btn" onclick="move('right')">→</button>
            </div>
        </div>

        <div class="instructions">
            <p><strong>玩法：</strong>使用方向键 ↑↓←→ 或滑动屏幕移动方块</p>
            <p>相同数字的方块相撞时会合并，目标是得到 2048！</p>
        </div>
    </div>

    <script>
        // ==================== 游戏配置区域 ====================
        // 
        // 【棋子样式配置】
        // 你可以在这里轻松修改每个数字的显示样式！
        // 
        // 配置方式一：CSS 样式（推荐简单使用）
        //   style: { background: '颜色', color: '文字颜色', fontSize: '字号' }
        //
        // 配置方式二：图片背景
        //   image: '图片路径'  (可以是相对路径或网址)
        //   如果有 image，会优先使用图片，忽略 style 设置
        //
        // =====================================================

        const tileStyles = {
            // 默认空格子样式
            0: {
                style: { background: 'rgba(238, 228, 218, 0.6)', color: 'transparent' }
            },

            // 数字 2 - 使用 CSS 颜色
            2: {
                style: { background: '#e8e0d5', color: '#6b5d4d', fontSize: '28px' }
                // 示例：使用图片
                // image: 'tiles/tile-2.png'
            },

            // 数字 4
            4: {
                style: { background: '#dcd4c8', color: '#6b5d4d', fontSize: '28px' }
                // image: 'tiles/tile-4.png'
            },

            // 数字 8
            8: {
                style: { background: '#c9b8a5', color: 'white', fontSize: '28px' }
            },

            // 数字 16
            16: {
                style: { background: '#b5a390', color: 'white', fontSize: '28px' }
            },

            // 数字 32
            32: {
                style: { background: '#a69888', color: 'white', fontSize: '28px' }
            },

            // 数字 64
            64: {
                style: { background: '#9a8b7a', color: 'white', fontSize: '28px' }
            },

            // 数字 128 - 字号稍小
            128: {
                style: { background: '#8f9aa8', color: 'white', fontSize: '24px' }
            },

            // 数字 256
            256: {
                style: { background: '#7a8a9a', color: 'white', fontSize: '24px' }
            },

            // 数字 512
            512: {
                style: { background: '#6b7a8f', color: 'white', fontSize: '24px' }
            },

            // 数字 1024
            1024: {
                style: { background: '#8fa68a', color: 'white', fontSize: '20px' }
            },

            // 数字 2048 - 带发光动画
            2048: {
                style: { background: '#7a8f75', color: 'white', fontSize: '20px', animation: 'glow 1.5s ease-in-out infinite' }
            },

            // 更大的数字（4096, 8192...）
            super: {
                style: { background: '#9a8b9a', color: 'white', fontSize: '18px' }
            }
        };

        // 是否使用图片模式（自动检测，无需手动修改）
        const useImageMode = (value) => {
            const config = getTileConfig(value);
            return !!config.image;
        };

        // 获取指定数字的配置
        function getTileConfig(value) {
            if (value === 0) return tileStyles[0];
            if (value <= 2048 && tileStyles[value]) return tileStyles[value];
            if (value > 2048) return tileStyles.super || tileStyles[2048];
            return tileStyles[0];
        }

        // ==================== 游戏状态 ====================
        let board = [];
        let score = 0;
        let bestScore = 0;  // 只在单次会话保留，不存 localStorage
        let hasWon = false;
        let touchStartX = 0;
        let touchStartY = 0;

        // ==================== 游戏初始化 ====================
        function init() {
            // 创建网格 DOM
            createGridDOM();
            // 初始化游戏状态
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            updateScore();
            hideOverlays();
            addNewTile();
            addNewTile();
            render();
        }

        function createGridDOM() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.id = `cell-${r}-${c}`;
                    // 内部文本容器
                    const textSpan = document.createElement('span');
                    textSpan.className = 'tile-text';
                    cell.appendChild(textSpan);
                    grid.appendChild(cell);
                }
            }
        }

        function hideOverlays() {
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('game-won').classList.remove('show');
        }

        function addNewTile() {
            const emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }
            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
                return { r, c, isNew: true };
            }
            return null;
        }

        // ==================== 核心渲染函数（已模块化） ====================
        function render() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    const value = board[r][c];
                    renderTile(cell, value);
                }
            }
        }

        /**
         * 渲染单个棋子
         * @param {HTMLElement} cell - 格子 DOM 元素
         * @param {number} value - 数字值
         * @param {boolean} isNew - 是否是新产生的棋子（带动画）
         * @param {boolean} isMerged - 是否是合并产生的棋子（带动画）
         */
        function renderTile(cell, value, isNew = false, isMerged = false) {
            const config = getTileConfig(value);
            const textSpan = cell.querySelector('.tile-text');

            // 重置类名和内联样式
            cell.className = 'grid-cell';
            cell.removeAttribute('style');

            // 应用图片或样式
            if (config.image) {
                // 图片模式
                cell.classList.add('has-image');
                cell.style.backgroundImage = `url(${config.image})`;
            } else {
                // CSS 样式模式 - 依赖外部 CSS 文件中的 .tile-X 类
                if (value > 0) {
                    const className = value <= 2048 ? `tile-${value}` : 'tile-super';
                    cell.classList.add(className);
                }
            }

            // 设置文本
            textSpan.textContent = value === 0 ? '' : value;

            // 添加动画类
            if (isNew) cell.classList.add('tile-new');
            if (isMerged) cell.classList.add('tile-merge');
        }

        /**
         * 更新单个格子的显示（用于动画效果）
         */
        function updateCell(r, c, isNew = false, isMerged = false) {
            const cell = document.getElementById(`cell-${r}-${c}`);
            const value = board[r][c];
            renderTile(cell, value, isNew, isMerged);
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            // 最高分只在单次会话保留，不存入 localStorage
            if (score > bestScore) {
                bestScore = score;
            }
            document.getElementById('best-score').textContent = bestScore;
        }

        // ==================== 游戏逻辑 ====================
        function move(direction) {
            let moved = false;
            const mergedPositions = []; // 记录合并的位置，用于动画
            const newTileInfo = { r: -1, c: -1 }; // 新棋子的位置

            function slideRow(row, rowIndex, isColumn = false, colIndex = 0) {
                const originalRow = [...row];
                const filtered = row.filter(val => val !== 0);
                const mergedIndices = [];

                for (let i = 0; i < filtered.length - 1; i++) {
                    if (filtered[i] === filtered[i + 1]) {
                        filtered[i] *= 2;
                        score += filtered[i];
                        if (filtered[i] === 2048 && !hasWon) {
                            hasWon = true;
                            setTimeout(() => {
                                document.getElementById('game-won').classList.add('show');
                            }, 200);
                        }
                        filtered[i + 1] = 0;
                        mergedIndices.push(i);
                    }
                }

                const result = filtered.filter(val => val !== 0);
                while (result.length < 4) {
                    result.push(0);
                }

                // 记录合并位置
                mergedIndices.forEach(idx => {
                    if (isColumn) {
                        mergedPositions.push({ r: idx, c: colIndex });
                    } else {
                        mergedPositions.push({ r: rowIndex, c: idx });
                    }
                });

                return { result, changed: JSON.stringify(result) !== JSON.stringify(originalRow) };
            }

            if (direction === 'left') {
                for (let r = 0; r < 4; r++) {
                    const { result, changed } = slideRow(board[r], r);
                    if (changed) {
                        moved = true;
                        board[r] = result;
                    }
                }
            } else if (direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    const reversed = [...board[r]].reverse();
                    const { result, changed } = slideRow(reversed, r);
                    if (changed) {
                        moved = true;
                        board[r] = result.reverse();
                        // 调整合并位置（因为是反向的）
                        mergedPositions.forEach(pos => {
                            if (pos.r === r) pos.c = 3 - pos.c;
                        });
                    }
                }
            } else if (direction === 'up') {
                for (let c = 0; c < 4; c++) {
                    const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    const { result, changed } = slideRow(col, 0, true, c);
                    if (changed) {
                        moved = true;
                        for (let r = 0; r < 4; r++) {
                            board[r][c] = result[r];
                        }
                    }
                }
            } else if (direction === 'down') {
                for (let c = 0; c < 4; c++) {
                    const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    const reversed = col.reverse();
                    const { result, changed } = slideRow(reversed, 0, true, c);
                    if (changed) {
                        moved = true;
                        const finalResult = result.reverse();
                        for (let r = 0; r < 4; r++) {
                            board[r][c] = finalResult[r];
                        }
                        // 调整合并位置
                        mergedPositions.forEach(pos => {
                            if (pos.c === c) pos.r = 3 - pos.r;
                        });
                    }
                }
            }

            if (moved) {
                updateScore();
                const newTile = addNewTile();
                render();

                // 添加动画效果
                if (newTile) {
                    updateCell(newTile.r, newTile.c, true, false);
                }
                mergedPositions.forEach(pos => {
                    updateCell(pos.r, pos.c, false, true);
                });

                if (isGameOver()) {
                    setTimeout(() => {
                        document.getElementById('game-over').classList.add('show');
                    }, 300);
                }
            }
        }

        function isGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) return false;
                    if (c < 3 && board[r][c] === board[r][c + 1]) return false;
                    if (r < 3 && board[r][c] === board[r + 1][c]) return false;
                }
            }
            return true;
        }

        function newGame() {
            // 重置最高分（因为是新会话/新游戏）
            bestScore = 0;
            init();
        }

        function continueGame() {
            document.getElementById('game-won').classList.remove('show');
        }

        // ==================== 事件监听 ====================
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp': e.preventDefault(); move('up'); break;
                case 'ArrowDown': e.preventDefault(); move('down'); break;
                case 'ArrowLeft': e.preventDefault(); move('left'); break;
                case 'ArrowRight': e.preventDefault(); move('right'); break;
            }
        });

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const minSwipeDistance = 50;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > minSwipeDistance) {
                    dx > 0 ? move('right') : move('left');
                }
            } else {
                if (Math.abs(dy) > minSwipeDistance) {
                    dy > 0 ? move('down') : move('up');
                }
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('.game-container')) {
                e.preventDefault();
            }
        }, { passive: false });

        // 初始化
        init();
    </script>
</body>

</html>
